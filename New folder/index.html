<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>E-commerce Admin Intractive Interface</title>
</head>
<body>
    <div class="container">
        <!-- Added a top navigation area for the login button -->
        <div class="header-nav">
            <h1>Product Management</h1>
           
        </div>

        <form id="product-form">
            <input type="text" id="product-name" placeholder="Product Name" required>
            <input type="number" id="product-price" placeholder="Selling Price" required>
            <button type="submit">Add Product</button> 
        </form>

        <h2>Product List</h2>
        <ul id="product-list"></ul>

        <h3>Total Value: $<span id="total-value">0</span></h3>
        
         <a href="login.html" class="login-btn">Login</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
